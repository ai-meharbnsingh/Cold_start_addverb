# ═══════════════════════════════════════════════════════════
# WAREHOUSE CONFIGURATION — EDIT THIS FOR YOUR WAREHOUSE
# ═══════════════════════════════════════════════════════════
#
# This is the ONLY config file you need to customize.
# Fill in your zone names, positions, types, and map coordinates.

warehouse:
  name: "YOUR_WAREHOUSE_NAME"         # ← CHANGE: Your warehouse identifier
  grid_spacing_m: 10.0                # Distance between zone centers (meters)

# ── ZONE DEFINITIONS ──────────────────────────────────────
# Add ALL navigable zones in your warehouse.
#
# Fields:
#   name:     Unique name (used in all io-gita outputs)
#   row, col: Grid position (0-indexed, top-left origin)
#   type:     dock | aisle | shelf | cross | hub | lane | mid
#   heading:  Typical robot heading entering zone (degrees, 0=North, 90=East)
#   dist_from_dock: Approx distance from nearest dock (meters)
#   map_x:    X coordinate in YOUR map frame (meters)
#   map_y:    Y coordinate in YOUR map frame (meters)
#   map_zone_radius: Search radius for AMCL constraint (meters)

zones:
  # ── ROW 0: Docks and main aisle ──
  - name: "DOCK_A"
    row: 0
    col: 0
    type: "dock"
    heading: 90
    dist_from_dock: 0
    map_x: 5.0             # ← CHANGE to your map coordinates
    map_y: 5.0             # ← CHANGE to your map coordinates
    map_zone_radius: 5.0   # ← CHANGE: how big is this zone

  - name: "AISLE_1"
    row: 0
    col: 1
    type: "aisle"
    heading: 90
    dist_from_dock: 5
    map_x: 15.0
    map_y: 5.0
    map_zone_radius: 3.0

  # ── ADD ALL YOUR ZONES BELOW ──
  # Copy the block above and change name, row, col, type, coordinates
  #
  # - name: "SHELF_1"
  #   row: 1
  #   col: 1
  #   type: "shelf"
  #   heading: 90
  #   dist_from_dock: 12
  #   map_x: 15.0
  #   map_y: 15.0
  #   map_zone_radius: 3.0

# ── ADJACENCY OVERRIDES (optional) ────────────────────────
# By default, zones at Manhattan distance 1 are connected.
# Add overrides if your warehouse has non-grid connections.
adjacency_overrides: []
  # - from: "DOCK_A"
  #   to: "SHELF_3"      # Add a shortcut connection

# ── ENGINE PARAMETERS (do NOT change) ────────────────────
engine:
  D: 10000
  beta: 4.0
  dt: 0.05
  seed: 42
  n_scans_per_zone: 5
  generated_patterns: 15

# ── COLD START SETTINGS ──────────────────────────────────
cold_start:
  saved_zone_file: "/tmp/iogita_last_zone.json"
  confidence_threshold: 0.6
  amcl_hint_max_zones: 5
  teleport_confidence: 0.3

# ── MAP CHANGE DETECTION ─────────────────────────────────
map_change:
  enabled: true
  mismatch_threshold: 3
  fingerprint_tolerance: 0.3

# ── DEBUG ─────────────────────────────────────────────────
debug:
  enabled: true
  log_file: "/tmp/iogita_debug.jsonl"
  publish_debug_topic: true
  verbose: false
